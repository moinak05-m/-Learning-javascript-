<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Learning JS | DOM </title>
</head>
<body style="background-color: black; color: white;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    function addLanguage(languagename) {
        const li = document.createElement('li');
        li.innerHTML = `${languagename}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("Python")
    addLanguage("CPP")

    function addOptimizeLng(langname){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langname))
        document.querySelector('.language').appendChild(li)
    }
    addOptimizeLng("JAVA")

    //edit
    const secoendlang = document.querySelector("li:nth-child(2)")
    // secoendlang.innerHTML = "Mojo"
    const newli = document.createElement('li')
    newli.textContent = "Mojo"
    secoendlang.replaceWith(newli)
</script>
</html>
